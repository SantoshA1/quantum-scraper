name: Publish to n8n (manual, guarded)

# DELIBERATELY manual (workflow_dispatch) — NOT push-triggered. Auto-publishing to
# a live trading pipeline on every merge is unsafe; publishing is a reviewed act.
# Flow: run the CI quality gate -> diff repo vs live -> (optional) publish one
# workflow by id, guarded by the n8n-sync staleness guard (refuses if live changed
# since last reconcile). The MANUAL trigger itself is the primary gate: nothing
# publishes unless a human deliberately runs this workflow and picks mode=publish.
#
# OPTIONAL hardening (does NOT block use): a GitHub Environment named `production`
# with Required Reviewers adds a SECOND approval click. Environment reviewer
# protection needs GitHub Pro/Team on private repos and can be fiddly to enable —
# so it is NOT required here. To add it later: create an env named exactly
# `production` (Settings -> Environments), set yourself as a required reviewer,
# then uncomment the `environment: production` line in the publish job below.
#
# Prereqs (one-time, PO):
#   - Repo secret  N8N_API_KEY   (n8n Settings -> n8n API)
#   - Repo variable N8N_BASE_URL = https://tradenextgen.app.n8n.cloud
#   - Reconcile the repo to live first: run `node .ci/n8n-sync.js export` (or let
#     the architect reconcile via the n8n MCP), commit, so manifest versionId = live.

on:
  workflow_dispatch:
    inputs:
      workflow_id:
        description: 'n8n workflow id to publish (must exist in .ci/n8n-manifest.json)'
        required: true
      mode:
        description: 'diff (read-only) or publish'
        required: true
        default: 'diff'
        type: choice
        options: [diff, publish]

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: CI quality gate (must pass before any publish)
        run: npm run ci

  publish:
    needs: gate
    runs-on: ubuntu-latest
    # OPTIONAL second approval gate — uncomment once a `production` environment with
    # required reviewers exists (see header). The workflow_dispatch manual trigger is
    # the primary gate, so this is safe to leave off.
    # environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Diff or publish (staleness-guarded)
        env:
          N8N_BASE_URL: ${{ vars.N8N_BASE_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          # Only the 'publish' choice sets N8N_ALLOW_PUBLISH; 'diff' stays read-only.
          N8N_ALLOW_PUBLISH: ${{ inputs.mode == 'publish' && 'true' || 'false' }}
        run: node .ci/n8n-sync.js ${{ inputs.mode }} --id "${{ inputs.workflow_id }}"
